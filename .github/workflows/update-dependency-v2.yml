name: Update dependency version

on:
  repository_dispatch:
    types: [dependency-released]
  workflow_dispatch:
    inputs:
      dependency:
        description: "Dependency name (example: dep-beta)"
        required: true
        type: string
      version:
        description: "Version tag to set (example: v0.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-dependency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve incoming payload
        id: incoming
        run: |
          set -euo pipefail

          DEPENDENCY="${{ github.event.client_payload.dependency || github.event.inputs.dependency }}"
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"

          if [ -z "${DEPENDENCY}" ] || [ -z "${VERSION}" ]; then
            echo "Missing dependency or version input."
            exit 1
          fi

          if [[ ! "${DEPENDENCY}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "Invalid dependency name: ${DEPENDENCY}"
            exit 1
          fi

          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${VERSION}"
            exit 1
          fi

          echo "dependency=${DEPENDENCY}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Update tracked version file
        id: update
        run: |
          set -euo pipefail

          DEPENDENCY="${{ steps.incoming.outputs.dependency }}"
          NEXT_VERSION="${{ steps.incoming.outputs.version }}"
          OWNER="dsanroman96"
          TARGET_SPEC="github:${OWNER}/${DEPENDENCY}#${NEXT_VERSION}"

          CHANGED="$(DEPENDENCY="${DEPENDENCY}" TARGET_SPEC="${TARGET_SPEC}" node - <<'JS'
const fs = require("fs");
const path = "package.json";
const dependency = process.env.DEPENDENCY;
const targetSpec = process.env.TARGET_SPEC;
const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
pkg.dependencies = pkg.dependencies || {};
const current = pkg.dependencies[dependency] || "";
if (current === targetSpec) {
  process.stdout.write("false");
  process.exit(0);
}
pkg.dependencies[dependency] = targetSpec;
fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
process.stdout.write("true");
JS
)"
          echo "changed=${CHANGED}" >> "${GITHUB_OUTPUT}"

      - name: Commit and push
        if: steps.update.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: update ${{ steps.incoming.outputs.dependency }} to ${{ steps.incoming.outputs.version }}"
          git push
